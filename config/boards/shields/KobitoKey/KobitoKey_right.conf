# config/boards/shields/KobitoKey/KobitoKey_right.conf (一時修正版)

CONFIG_ZMK_POINTING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_MOUSE=y

# CONFIG_SPI=y         # コメントアウト（#）
# CONFIG_INPUT=y       # コメントアウト（#）
# CONFIG_INPUT_PMW3610=y # コメントアウト（#）

CONFIG_ZMK_BATTERY_REPORTING=y

# LEDウィジェットをオフ
CONFIG_RGBLED_WIDGET=n

# アイドル状態に移行する時間を5分（300000ミリ秒）に延長
CONFIG_ZMK_IDLE_TIMEOUT=300000

# Bluetoothの電波出力を最大にして接続を安定化（nRF52用）
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
